<button [routerLink]="['/albums', albumId]">Back to Album</button>
<h2>Photos</h2>

@if (loading) {
  <p>Loading photos...</p>
} @else {
  <div class="grid">
    @for (photo of photos; track photo.id) {
      <div class="card">
        <img [src]="photo.thumbnailUrl" [alt]="photo.title">
        <p>{{ photo.title }}</p>
      </div>
    }
  </div>
}
